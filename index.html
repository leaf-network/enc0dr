<!DOCTYPE html>
<html>
<head>
    <title>enc0dr</title>
    <style>
        body {
            font-family: arial;
        }
        h1 {
            text-align: center;
            text-weight: 3px;
        }
        input {
            background-color: white;
            border-radius: 10px;
            height: 25px;
            align: center;
            text-align: center;
            width: 200px;
        }
        #output {
            margin-left: 15px;
        }
        button {
            background-color: black;
            margin: 5px;
            border-radius: 10px;
            height: 25px;
            width: 75px;
            color: white;
            align: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>enc0der</h1>
    <div align="center">
    <p><input type="text" id="input" placeholder="Enter text"/>
    <br>
    <button onclick="encode()">Encode</button><button onclick="decode()">Decode</button></p></div>
    <code><div id="output"></div></code>

    <script>
        function encode() {
            const input = document.getElementById('input').value;
            let output = '';
            
            for (let i = 0; i < input.length; i++) {
                const char = input[i];
                const code = input.charCodeAt(i);

            
                if (code >= 97 && code <= 122) {
                    output += String.fromCharCode(((code - 97 + 1) % 26) + 97);
                }
                else if (code >= 65 && code <= 90) {
                    output += String.fromCharCode(((code - 65 + 1) % 26) + 65);
                }
                else {
                    output += char;
                }
            }
            
            document.getElementById('output').textContent = output;
        }
        function decode() {
            const input = document.getElementById('input').value;
            let output = '';
            
            for (let i = 0; i < input.length; i++) {
                const char = input[i];
                const code = input.charCodeAt(i);

            
                if (code >= 97 && code <= 122) {
                    output += String.fromCharCode(((code - 97 - 1) % 26) + 97);
                }
                else if (code >= 65 && code <= 90) {
                    output += String.fromCharCode(((code - 65 - 1) % 26) + 65);
                }
                else {
                    output += char;
                }
            }
            
            document.getElementById('output').textContent = output;
        }
    </script>
</body>
</html>
