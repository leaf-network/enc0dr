<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>enc0dr</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #646cff;
            --accent-hover: #535bf2;
            --border: #404040;
            --input-bg: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid var(--border);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(100, 108, 255, 0.2);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-secondary);
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-encode {
            background-color: var(--accent);
        }

        .btn-encode:hover {
            background-color: var(--accent-hover);
        }

        .btn-decode {
            background-color: #404040;
        }

        .btn-decode:hover {
            background-color: #505050;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .output-section {
            background-color: var(--input-bg);
            border-radius: 8px;
            padding: 1rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            word-break: break-all;
        }

        #output {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            color: var(--text-primary);
            width: 100%;
            text-align: left;
        }

        #output.error {
            color: #ff6b6b;
        }
        icon {
            font-size: 5rem;
            text-alig: center;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>enc0dr</h1>
        
        <div class="input-group">
            <input type="text" id="input" placeholder="Enter text to encode or decode" />
        </div>

        <div class="input-group">
            <input type="password" id="passInput" placeholder="Secret (choose and give it to the person you want to decode with the output)" />
        </div>
        
        <div class="button-group">
            <button class="btn-encode" onclick="encode()">Encode</button>
            <button class="btn-decode" onclick="decode()">Decode</button>
        </div>
        
        <div class="output-section">
            <div id="output"></div>
        </div>
    </div>

    <script>
        const ITERATIONS = 1_000_000;
        const enc = new TextEncoder();
        const dec = new TextDecoder();

        async function deriveKey(passphrase, salt) {
            const keyMaterial = await crypto.subtle.importKey(
                'raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']
            );
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-512' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        function toBase64(buf) {
            return btoa(String.fromCharCode(...new Uint8Array(buf)));
        }

        function fromBase64(str) {
            return Uint8Array.from(atob(str), c => c.charCodeAt(0));
        }

        function setOutput(text, isError = false) {
            const el = document.getElementById('output');
            el.textContent = text;
            el.className = isError ? 'error' : '';
        }

        function setBusy(on) {
            document.querySelectorAll('button').forEach(b => b.disabled = on);
        }

        async function encode() {
            const input = document.getElementById('input').value;
            const pass  = document.getElementById('passInput').value;
            if (!input) return setOutput('Enter text to encode.', true);
            if (!pass)  return setOutput('Enter a password.', true);

            setBusy(true);
            try {
                const salt = crypto.getRandomValues(new Uint8Array(32));
                const iv   = crypto.getRandomValues(new Uint8Array(12));
                const key  = await deriveKey(pass, salt);
                const ct   = await crypto.subtle.encrypt({ name: 'AES-GCM', iv, tagLength: 128 }, key, enc.encode(input));

                const payload = new Uint8Array(32 + 12 + ct.byteLength);
                payload.set(salt, 0);
                payload.set(iv, 32);
                payload.set(new Uint8Array(ct), 44);
                setOutput(toBase64(payload.buffer));
            } catch (e) {
                setOutput('Encryption error: ' + e.message, true);
            } finally {
                setBusy(false);
            }
        }

        async function decode() {
            const input = document.getElementById('input').value.trim();
            const pass  = document.getElementById('passInput').value;
            if (!input) return setOutput('Paste text to decode.', true);
            if (!pass)  return setOutput('Enter a password.', true);

            setBusy(true);
            try {
                const payload = fromBase64(input);
                if (payload.length < 45) throw new Error('Invalid ciphertext');
                const salt = payload.slice(0, 32);
                const iv   = payload.slice(32, 44);
                const ct   = payload.slice(44);
                const key  = await deriveKey(pass, salt);
                const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv, tagLength: 128 }, key, ct);
                setOutput(dec.decode(plain));
            } catch (e) {
                setOutput('wrong passphrase or invalid data.', true);
            } finally {
                setBusy(false);
            }
        }
    </script>
</body>
</html>
